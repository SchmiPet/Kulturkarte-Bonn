<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulturkarte Bonn — Volt Bonn</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
  header { background: #502379; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 500; }
  header span { font-size: 13px; opacity: 0.8; }
  #container { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .filter-bar { background: white; border-radius: 10px; border: 0.5px solid #ddd; padding: 12px 16px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .fg { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .fl { font-size: 11px; color: #888; font-weight: 600; margin-right: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .fb { font-size: 12px; padding: 4px 11px; border-radius: 20px; border: 0.5px solid #ccc; background: white; color: #444; cursor: pointer; transition: all 0.15s; }
  .fb.active { background: #502379; color: white; border-color: #502379; }
  .fb:hover:not(.active) { background: #f0f0f0; }
  .sep { width: 0.5px; height: 24px; background: #e0e0e0; margin: 0 4px; }
  #map { width: 100%; height: 580px; border-radius: 10px; border: 0.5px solid #ddd; z-index: 1; }
  .footer-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .ld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #cnt { font-size: 12px; color: #999; }
  .leaflet-popup-content-wrapper { border-radius: 8px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important; }
  .leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif !important; font-size: 13px !important; margin: 10px 14px !important; }
  .pp-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; color: #222; }
  .pp-info { color: #666; font-size: 12px; margin-bottom: 2px; }
  .pp-bezirk { color: #999; font-size: 11px; margin-bottom: 6px; }
  .pp-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }
</style>
</head>
<body>

  {name:"Bundeskunsthalle", kat:"Museum", traeger:"bund", bezirk:"Innenstadt", lat:50.7145, lng:7.1220, info:"Ausstellungshaus — Bund"},
  {name:"Deutsches Museum Bonn", kat:"Museum", traeger:"bund", bezirk:"Bad Godesberg", lat:50.6990, lng:7.1508, info:"Wissenschaft / Technik / KI"},
  {name:"LVR LandesMuseum Bonn", kat:"Museum", traeger:"bund", bezirk:"Innenstadt", lat:50.7319, lng:7.0928, info:"Kulturgeschichte / Archäologie"},

  {name:"NS-Dokumentationszentrum", kat:"Museum", traeger:"städtisch", bezirk:"Innenstadt", lat:50.7376, lng:7.0940, info:"Gedenkstätte / Zeitgeschichte"},

  {name:"Bonner Kinemathek", kat:"Kino", traeger:"frei", bezirk:"Beuel", lat:50.7420, lng:7.1230, info:"Filmarchiv / Kulturkino"},

const COLORS = { städtisch:"#502379", bund:"#1D9E75", frei:"#378ADD", privat:"#D85A30" };
const CLABELS = { städtisch:"Städtisch", bund:"Bund / Land", frei:"Frei / Verein", privat:"Privat" };
let activeFilters = { traeger:'alle', kat:'alle', bezirk:'alle' };
let layerGroup;

const map = L.map('map').setView([50.718, 7.110], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>-Mitwirkende',
  maxZoom: 18
}).addTo(map);
layerGroup = L.layerGroup().addTo(map);

function makeIcon(traeger) {
  const color = COLORS[traeger] || '#888';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="36" viewBox="0 0 26 36"><path d="M13 0C6 0 0 6 0 13c0 10 13 23 13 23S26 23 26 13C26 6 20 0 13 0z" fill="${color}" stroke="white" stroke-width="1.5"/><circle cx="13" cy="13" r="6" fill="white" opacity="0.9"/></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize:[26,36], iconAnchor:[13,36], popupAnchor:[0,-38] });
}

function renderMarkers() {
  layerGroup.clearLayers();
  const filtered = ORTE.filter(o => {
    if (activeFilters.traeger !== 'alle' && o.traeger !== activeFilters.traeger) return false;
    if (activeFilters.kat !== 'alle' && o.kat !== activeFilters.kat) return false;
    if (activeFilters.bezirk !== 'alle' && o.bezirk !== activeFilters.bezirk) return false;
    return true;
  });
  filtered.forEach(o => {
    const color = COLORS[o.traeger];
    const marker = L.marker([o.lat, o.lng], { icon: makeIcon(o.traeger) });
    marker.bindPopup(`<div class="pp-name">${o.name}</div><div class="pp-info">${o.info}</div><div class="pp-bezirk">${o.bezirk}</div><span class="pp-badge" style="background:${color}22;color:${color};border:0.5px solid ${color}55;">${CLABELS[o.traeger]}</span><span class="pp-badge" style="background:#88888818;color:#666;border:0.5px solid #88888844;">${o.kat}</span>`);
    layerGroup.addLayer(marker);
  });
  document.getElementById('cnt').textContent = `${filtered.length} von ${ORTE.length} Kulturorten`;
}

document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.f, v = btn.dataset.v;
    activeFilters[g] = v;
    document.querySelectorAll(`.fb[data-f="${g}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMarkers();
  });
});
renderMarkers();
</script>
</body>
</html>
